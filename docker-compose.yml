services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webdown-api
    networks:
      - webdown-network
    environment:
      - PYTHONUNBUFFERED=1
      - APP_MODE=api
      - API_PORT=8000
      - DB_DIR=/app/data
    volumes:
      - hq_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webdown-mcp
    networks:
      - webdown-network
    environment:
      - PYTHONUNBUFFERED=1
      - APP_MODE=mcp
      - WEBDOWN_TRANSPORT=http
      - WEBDOWN_HOST=0.0.0.0
      - WEBDOWN_PORT=8002
      - DB_DIR=/app/data
    volumes:
      - hq_data:/app/data
    ports:
      - "8002:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8002/mcp -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"ping\",\"id\":1}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  webdown-network:
    driver: bridge

volumes:
  hq_data:
